name: olympus_sdk
description: >
  Official Dart SDK for Olympus Cloud — the AI Business Operating System.
  Typed API client for all 18+ platform services: Auth, Commerce, AI, Pay,
  Notify, Events, Data, Storage, Marketplace, Billing, Gating, Devices, and more.
version: 0.1.0
publish_to: "none"



environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  dio: ^5.8.0+1
  json_annotation: ^4.9.0
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  test: ^1.25.15
